  <line x1="10" y1="10" x2="12" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="22" y1="12" x2="20" y2="24" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="12" y1="22" x2="20" y2="24" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="22" y1="12" x2="12" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Graph nodes -->
  <circle cx="10" cy="10" r="3.5" fill="#fff"/>
  <circle cx="22" cy="12" r="3" fill="#A5B4FC"/>
  <circle cx="12" cy="22" r="3" fill="#C4B5FD"/>
