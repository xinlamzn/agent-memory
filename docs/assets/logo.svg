<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#logo-bg)"/>

  <!-- Brain outline with graph nodes integrated -->
  <!-- Left hemisphere -->
  <path d="M11 11 Q8 13 8 16 Q8 19 10 21 Q11 23 13 23"
        fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M11 11 Q13 9 16 9"
        fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M10 14 Q9 16 10 18"
        fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>

  <!-- Right hemisphere -->
  <path d="M21 11 Q24 13 24 16 Q24 19 22 21 Q21 23 19 23"
        fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M21 11 Q19 9 16 9"
        fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M22 14 Q23 16 22 18"
        fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>

  <!-- Central division / corpus callosum -->
  <line x1="16" y1="9" x2="16" y2="23" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Graph edges connecting nodes within brain -->
  <line x1="11" y1="12" x2="16" y2="14" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <line x1="21" y1="12" x2="16" y2="14" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <line x1="16" y1="14" x2="16" y2="19" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <line x1="12" y1="20" x2="16" y2="19" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <line x1="20" y1="20" x2="16" y2="19" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <line x1="11" y1="12" x2="12" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="21" y1="12" x2="20" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>

  <!-- Graph nodes (Neo4j style) -->
  <circle cx="11" cy="12" r="2.5" fill="#fff"/>
  <circle cx="21" cy="12" r="2.5" fill="#fff"/>
  <circle cx="16" cy="14" r="3" fill="#A5B4FC"/>
  <circle cx="16" cy="19" r="3" fill="#A5B4FC"/>
  <circle cx="12" cy="20" r="2" fill="#C4B5FD"/>
  <circle cx="20" cy="20" r="2" fill="#C4B5FD"/>
</svg>
